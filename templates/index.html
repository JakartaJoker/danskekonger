<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Danske Konger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .question-panel {
            width: 33%;
        }

        .answer-panel {
            width: 67%;
        }

        textarea {
            width: 100%;
            height: 250px;
            font-size: 16px;
            padding: 10px;
        }

        .answer-box {
            background: white;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ccc;
            white-space: pre-wrap;
        }

        button {
            margin-top: 10px;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Danske Konger</h1>

    <div class="container">
        <div class="question-panel">
            <h3>Dit spørgsmål om danske konger?</h3>
            <textarea id="question"></textarea>
            <button onclick="askAI()">Spørg AI</button>
        </div>

        <div class="answer-panel">
            <h3>Svaret på dit spørgsmål!</h3>
            <div id="answer" class="answer-box"></div>
        </div>
    </div>

    <script>
        async function askAI() {
            const questionBox = document.getElementById("question");
            const answerBox = document.getElementById("answer");

            const question = questionBox.value.trim();

            if (!question) {
                answerBox.textContent = "Skriv først et spørgsmål.";
                return;
            }

            questionBox.value = "";
            answerBox.textContent = "";

            const formData = new FormData();
            formData.append("question", question);

            const response = await fetch("/stream", {
                method: "POST",
                body: formData
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            while (true) {
                const { value, done } = await reader.read();

                if (done) {
                    break;
                }

                const chunk = decoder.decode(value);
                answerBox.textContent += chunk;
                answerBox.scrollTop = answerBox.scrollHeight;
            }
        }
    </script>

</body>
</html>
